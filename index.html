<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>繁簡轉換與批次取代工具</title>
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f8fafc;
        }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        textarea { resize: none; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 px-6 py-3 sticky top-0 z-40 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-3">
            <div class="text-blue-600 text-2xl font-bold">📝</div>
            <div>
                <h1 class="text-lg font-bold text-slate-800 leading-none">繁簡轉換與批次取代</h1>
                <p class="text-xs text-slate-500 mt-1">精準轉換 + 自定義規則</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleBulkPanel()" class="text-slate-600 hover:bg-slate-100 px-3 py-2 rounded-lg text-sm font-medium transition">
                管理取代規則
            </button>
            <button onclick="copyText()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-medium text-sm transition shadow-sm">
                複製結果
            </button>
        </div>
    </header>

    <div class="flex flex-grow relative overflow-hidden">
        <!-- Main Content -->
        <main class="flex-grow p-4 lg:p-8 overflow-y-auto">
            <div class="max-w-6xl mx-auto space-y-4">
                
                <!-- 功能按鈕區 -->
                <div class="flex flex-wrap gap-2 mb-2">
                    <button onclick="handleConvert('s2t')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">簡轉繁 (OpenCC)</button>
                    <button onclick="handleConvert('t2s')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">繁轉簡 (OpenCC)</button>
                    <button onclick="performReplacer()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">套用取代規則</button>
                    <div class="h-8 w-[1px] bg-slate-200 mx-2"></div>
                    <button onclick="clearAll()" class="text-slate-500 hover:bg-slate-100 px-4 py-2 rounded-lg text-sm transition">清空內容</button>
                    <button onclick="downloadTxt()" class="text-slate-500 hover:bg-slate-100 px-4 py-2 rounded-lg text-sm transition">下載 .txt</button>
                </div>

                <!-- 編輯區 -->
                <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col md:flex-row h-[600px]">
                    <div class="flex-1 flex flex-col border-b md:border-b-0 md:border-r border-slate-200">
                        <div class="bg-slate-50 px-4 py-2 text-[10px] font-bold text-slate-400 uppercase tracking-wider border-b border-slate-200">輸入內容</div>
                        <textarea id="mainInput" class="flex-grow p-4 outline-none text-slate-700 text-lg leading-relaxed" placeholder="在此貼上文字..."></textarea>
                    </div>
                    <div id="stats" class="bg-slate-50 px-4 py-3 text-xs text-slate-500 flex flex-wrap gap-4 md:hidden border-b border-slate-200">
                        <span>字數: <b id="mCharCount">0</b></span>
                        <span>UTF8: <b id="mUtf8Size">0</b></span>
                    </div>
                    <div class="hidden md:flex w-48 bg-slate-50 p-4 flex-col gap-4 text-xs border-l border-slate-200">
                        <h4 class="font-bold text-slate-400 uppercase tracking-tighter">統計資訊</h4>
                        <div class="space-y-3">
                            <div><p class="text-slate-400">總字數</p><p id="charCount" class="text-lg font-semibold text-slate-700">0</p></div>
                            <div><p class="text-slate-400">UTF-8 Size</p><p id="utf8Size" class="text-sm font-medium text-slate-700">0 Bytes</p></div>
                            <div><p class="text-slate-400">Big5/GBK</p><p id="legacySize" class="text-sm font-medium text-slate-700">0 Bytes</p></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Rules Sidebar (Replacer) -->
        <aside id="bulkPanel" class="w-80 md:w-96 bg-white border-l border-slate-200 shadow-2xl flex flex-col fixed right-0 top-[65px] bottom-0 z-30 sidebar-transition translate-x-full">
            <div class="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                <h2 class="font-bold text-slate-700">批次取代規則</h2>
                <button onclick="toggleBulkPanel()" class="text-slate-400 hover:text-slate-600 p-1">✕</button>
            </div>
            
            <div class="flex-grow overflow-y-auto p-4 no-scrollbar space-y-3">
                <div id="bulkList" class="space-y-3">
                    <!-- JS Generated Rows -->
                </div>
                <button onclick="addNewRow()" class="w-full py-3 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 hover:border-blue-400 hover:text-blue-500 transition-all text-sm font-medium">
                    + 新增規則
                </button>
            </div>

            <div class="p-4 border-t border-slate-200 bg-slate-50 space-y-2">
                <button onclick="performReplacer(); toggleBulkPanel();" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-slate-900 transition shadow-lg">
                    執行取代
                </button>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="resetToPreset()" class="text-slate-500 text-xs py-2 hover:bg-slate-200 rounded-lg transition">恢復預設</button>
                    <button onclick="clearAllRules()" class="text-red-400 text-xs py-2 hover:bg-red-50 rounded-lg transition">清空規則</button>
                </div>
            </div>
        </aside>
    </div>

    <!-- Toast -->
    <div id="toast" class="invisible fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-2 rounded-full text-sm transition-all z-50 shadow-xl">
        Action executed
    </div>

    <script>
        // --- 核心變數 ---
        const inputArea = document.getElementById('mainInput');
        const DEFAULT_RULES = [
            { find: '只', replace: '隻' },
            { find: '噉', replace: '咁' },
            { find: '𠮶', replace: '嗰' },
            { find: '系', replace: '係' },
            { find: '啊', replace: '呀' },
            { find: '咗', replace: '左' }
        ];
        let bulkItems = [...DEFAULT_RULES];

        // --- OpenCC 轉換器初始化 ---
        const s2tConverter = OpenCC.Converter({ from: 'cn', to: 'tw' });
        const t2sConverter = OpenCC.Converter({ from: 'tw', to: 'cn' });

        // --- UI 渲染 ---
        function renderBulkList() {
            const container = document.getElementById('bulkList');
            container.innerHTML = '';
            bulkItems.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = 'flex items-center gap-2 group animate-in fade-in duration-200';
                row.innerHTML = `
                    <div class="flex-grow grid grid-cols-2 gap-1 bg-slate-50 p-1 rounded-lg border border-slate-100">
                        <input type="text" value="${item.find}" onchange="updateItem(${index}, 'find', this.value)" placeholder="尋找" class="bg-white text-xs p-2 rounded border-none outline-none focus:ring-1 focus:ring-blue-400">
                        <input type="text" value="${item.replace}" onchange="updateItem(${index}, 'replace', this.value)" placeholder="取代" class="bg-white text-xs p-2 rounded border-none outline-none focus:ring-1 focus:ring-blue-400">
                    </div>
                    <button onclick="deleteRow(${index})" class="text-slate-300 hover:text-red-500 transition-colors">✕</button>
                `;
                container.appendChild(row);
            });
        }

        function updateItem(index, key, value) { bulkItems[index][key] = value; }
        function addNewRow() { bulkItems.push({ find: '', replace: '' }); renderBulkList(); }
        function deleteRow(index) { bulkItems.splice(index, 1); renderBulkList(); }
        function clearAllRules() { bulkItems = []; renderBulkList(); }
        function resetToPreset() { bulkItems = [...DEFAULT_RULES]; renderBulkList(); showToast("已恢復預設規則"); }
        function toggleBulkPanel() { document.getElementById('bulkPanel').classList.toggle('translate-x-full'); }

        // --- 核心邏輯 ---
        function handleConvert(mode) {
            const text = inputArea.value;
            if (!text) return;
            try {
                inputArea.value = mode === 's2t' ? s2tConverter(text) : t2sConverter(text);
                updateStats();
                showToast(mode === 's2t' ? "已轉換為繁體" : "已轉換為簡體");
            } catch (e) { console.error(e); }
        }

        function performReplacer() {
            let text = inputArea.value;
            if (!text) return;
            bulkItems.forEach(item => {
                if (item.find) {
                    const escaped = item.find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    text = text.replace(new RegExp(escaped, 'g'), item.replace);
                }
            });
            inputArea.value = text;
            updateStats();
            showToast("取代規則套用成功");
        }

        function updateStats() {
            const text = inputArea.value;
            let utf8 = 0; let legacy = 0;
            for (let i = 0; i < text.length; i++) {
                const code = text.charCodeAt(i);
                if (code <= 0x7f) { utf8 += 1; legacy += 1; }
                else { utf8 += 3; legacy += 2; }
            }
            document.getElementById('charCount').innerText = text.length.toLocaleString();
            document.getElementById('mCharCount').innerText = text.length.toLocaleString();
            document.getElementById('utf8Size').innerText = utf8.toLocaleString() + " Bytes";
            document.getElementById('mUtf8Size').innerText = utf8.toLocaleString();
            document.getElementById('legacySize').innerText = legacy.toLocaleString() + " Bytes";
        }

        inputArea.addEventListener('input', updateStats);

        // --- 功能小工具 ---
        function copyText() {
            inputArea.select();
            document.execCommand('copy');
            showToast("已複製到剪貼簿");
        }

        function clearAll() { inputArea.value = ""; updateStats(); }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('invisible');
            t.classList.add('opacity-100');
            setTimeout(() => { t.classList.add('invisible'); t.classList.remove('opacity-100'); }, 2000);
        }

        function downloadTxt() {
            const blob = new Blob([inputArea.value], { type: "text/plain;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = `output_${Date.now()}.txt`; a.click();
        }

        window.onload = () => { renderBulkList(); updateStats(); };
    </script>
</body>
</html>
