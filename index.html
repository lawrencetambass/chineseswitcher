<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>繁簡中文轉換與編碼工具</title>
    <!-- 使用開源轉換庫 CDN (OpenCC-JS) -->
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .container {
            max-width: 1000px;
        }
        textarea {
            resize: vertical;
            min-height: 250px;
        }
    </style>
</head>
<body>

<div class="container mx-auto px-4 py-8">
    <header class="text-center mb-8">
        <h1 class="text-3xl font-bold text-slate-800 mb-2">繁簡中文轉換工具</h1>
        <p class="text-slate-600">支援精準繁簡互轉、字數統計及多編碼位元組預估</p>
    </header>

    <div class="bg-white rounded-xl shadow-md p-6">
        <!-- 工具列 -->
        <div class="flex flex-wrap gap-2 mb-4">
            <button onclick="handleConvert('s2t')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition font-medium">簡體轉繁體</button>
            <button onclick="handleConvert('t2s')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition font-medium">繁體轉簡體</button>
            <button onclick="clearAll()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2 rounded-lg transition">清空</button>
            <button onclick="copyText()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg transition">複製</button>
            <button onclick="downloadTxt()" class="bg-amber-600 hover:bg-amber-700 text-white px-4 py-2 rounded-lg transition">下載 .txt</button>
        </div>

        <!-- 輸入區域 -->
        <div class="relative">
            <textarea id="mainInput" class="w-full p-4 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-lg leading-relaxed" placeholder="請在此輸入或貼上需要轉換的文字..."></textarea>
            
            <div id="loading" class="hidden absolute inset-0 bg-white/50 flex items-center justify-center rounded-lg">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
            </div>

            <div id="stats" class="mt-3 grid grid-cols-2 sm:grid-cols-4 gap-4 text-sm text-slate-500 bg-slate-50 p-3 rounded-lg">
                <div>總字數: <b id="charCount" class="text-slate-800">0</b></div>
                <div>UTF-8: <b id="utf8Size" class="text-slate-800">0</b> bytes</div>
                <div>Big5: <b id="big5Size" class="text-slate-800">0</b> bytes</div>
                <div>GBK: <b id="gbkSize" class="text-slate-800">0</b> bytes</div>
            </div>
        </div>

        <!-- 提示訊息 -->
        <div id="toast" class="invisible fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-2 rounded-full shadow-lg transition-all">
            已複製到剪貼簿
        </div>
    </div>

    <!-- 說明與編碼對照 -->
    <div class="mt-8 grid md:grid-cols-2 gap-6">
        <div class="bg-white p-6 rounded-xl border border-slate-200">
            <h3 class="font-bold text-slate-800 mb-3 flex items-center">
                <svg class="w-5 h-5 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="id-card"></path></svg>
                功能說明
            </h3>
            <ul class="text-sm text-slate-600 space-y-2">
                <li class="flex items-start"><span class="mr-2">•</span>採用 OpenCC 字典，精準處理一字多義（如：發/髮、幹/乾）。</li>
                <li class="flex items-start"><span class="mr-2">•</span>支援大篇幅文本處理。</li>
                <li class="flex items-start"><span class="mr-2">•</span>即時計算不同中文編碼環境下的儲存大小。</li>
            </ul>
        </div>
        <div class="bg-white p-6 rounded-xl border border-slate-200">
            <h3 class="font-bold text-slate-800 mb-3 flex items-center">
                <svg class="w-5 h-5 mr-2 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="database"></path></svg>
                編碼參考
            </h3>
            <div class="text-xs space-y-2">
                <div class="flex justify-between border-b pb-1"><span>UTF-8</span><span class="text-slate-400">中文字 3 Bytes / 英文 1 Byte</span></div>
                <div class="flex justify-between border-b pb-1"><span>Big5</span><span class="text-slate-400">中文字 2 Bytes (繁體)</span></div>
                <div class="flex justify-between border-b pb-1"><span>GBK/GB2312</span><span class="text-slate-400">中文字 2 Bytes (簡體)</span></div>
                <div class="flex justify-between"><span>UTF-16</span><span class="text-slate-400">幾乎所有字元均為 2 Bytes</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    const inputArea = document.getElementById('mainInput');
    const loading = document.getElementById('loading');

    // 初始化轉換器 (使用 OpenCC-JS)
    const s2tConverter = OpenCC.Converter({ from: 'cn', to: 'tw' }); // 簡體到台灣繁體
    const t2sConverter = OpenCC.Converter({ from: 'tw', to: 'cn' }); // 台灣繁體到簡體

    function updateStats() {
        const text = inputArea.value;
        const charCount = text.length;
        
        let utf8 = 0;
        let legacy = 0; // 模擬 Big5 / GBK (非 ASCII 均視為 2 bytes)
        
        for (let i = 0; i < text.length; i++) {
            const code = text.charCodeAt(i);
            if (code <= 0x7f) {
                utf8 += 1;
                legacy += 1;
            } else if (code <= 0x7ff) {
                utf8 += 2;
                legacy += 2;
            } else if (code >= 0xd800 && code <= 0xdbff) {
                // Surrogate pair (4 bytes in UTF-8, 2/4 bytes in legacy)
                utf8 += 4;
                legacy += 2;
                i++; 
            } else {
                utf8 += 3;
                legacy += 2;
            }
        }

        document.getElementById('charCount').innerText = charCount.toLocaleString();
        document.getElementById('utf8Size').innerText = utf8.toLocaleString();
        document.getElementById('big5Size').innerText = legacy.toLocaleString();
        document.getElementById('gbkSize').innerText = legacy.toLocaleString();
    }

    inputArea.addEventListener('input', updateStats);

    async function handleConvert(mode) {
        const text = inputArea.value;
        if (!text) return;

        loading.classList.remove('hidden');
        
        // 使用 setTimeout 確保 UI loading 動畫能顯示
        setTimeout(() => {
            try {
                const result = mode === 's2t' ? s2tConverter(text) : t2sConverter(text);
                inputArea.value = result;
                updateStats();
            } catch (err) {
                console.error("轉換錯誤:", err);
            } finally {
                loading.classList.add('hidden');
            }
        }, 10);
    }

    function clearAll() {
        inputArea.value = "";
        updateStats();
    }

    function copyText() {
        if (!inputArea.value) return;
        inputArea.select();
        try {
            document.execCommand('copy');
            showToast("已複製到剪貼簿");
        } catch (err) {
            console.error('複製失敗');
        }
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.classList.remove('invisible');
        toast.classList.add('opacity-100');
        setTimeout(() => {
            toast.classList.add('invisible');
            toast.classList.remove('opacity-100');
        }, 2000);
    }

    function downloadTxt() {
        const text = inputArea.value;
        if (!text) return;
        const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `converted_${new Date().getTime()}.txt`;
        a.click();
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
